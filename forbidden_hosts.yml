---
# ============================================================
# Détection des hosts de production en inventaires hors-prod
# ============================================================
# Scanne tous les inventaires AAP de chaque organisation et
# alerte par email les équipes dont un inventaire hors-prod
# contient des hosts du domaine de production interdit.
#
# Conformité : PCI DSS — séparation stricte prod / hors-prod
#
# Planification AAP : chaque lundi à 08h00
# Inventory       : inventories/pre
# ============================================================
- name: Hosts de production interdits en hors-production AAP
  hosts: localhost
  gather_facts: false
  collections:
    - community.general

  vars:
    aap_api:      "{{ aap_host }}/api/v2"
    report_date:  "{{ now().strftime('%d/%m/%Y') }}"

  tasks:

    - name: "Collecte — scan des inventaires (domaine interdit : {{ forbidden_host_domain }})"
      set_fact:
        forbidden_by_org: >-
          {{ aap_organization_map | get_forbidden_hosts(aap_api, aap_token, forbidden_host_domain) }}

    - name: "Synthese — organisations en violation"
      debug:
        msg: >-
          {{ forbidden_by_org | length }} organisation(s) avec hosts interdits :
          {{ forbidden_by_org.keys() | list | join(', ') if forbidden_by_org else 'aucune' }}

    - name: "Transmission des resultats (workflow AAP)"
      set_stats:
        data:
          forbidden_hosts_report: "{{ forbidden_by_org }}"

    - name: "Alerte email — {{ _org.label }} ({{ item.value | length }} inventaire(s) en violation)"
      community.general.mail:
        host:    "{{ email_smtp_host }}"
        port:    "{{ email_smtp_port }}"
        from:    "{{ email_from }}"
        to:      "{{ _org.contact_email }}"
        cc:      "{{ email_cc }}"
        subject: >-
          [ALERTE PCI DSS] Hosts de production en hors-production AAP —
          {{ _org.label }} — {{ env_name }} — {{ report_date }}
        subtype: html
        body:    "{{ lookup('template', 'templates/email_forbidden.j2') }}"
      loop: "{{ forbidden_by_org | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      vars:
        _org: "{{ aap_organization_map | selectattr('name', 'equalto', item.key) | first }}"
